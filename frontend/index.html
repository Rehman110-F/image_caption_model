<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Caption Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { text-align:center; color:#64748b; font-size:.85rem; margin-bottom:1.75rem; }

    /* API URL */
    .api-row { display:flex; gap:.5rem; margin-bottom:1.5rem; align-items:center; }
    .api-row label { font-size:.78rem; color:#64748b; white-space:nowrap; }
    .api-row input {
      flex:1; background:#0f172a; border:1px solid #334155;
      border-radius:8px; color:#e2e8f0; padding:.4rem .75rem; font-size:.85rem;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed #334155; border-radius: 12px;
      padding: 2rem; text-align: center; cursor: pointer;
      transition: all .2s; position: relative;
    }
    .dropzone:hover, .dropzone.over { border-color:#6366f1; background:rgba(99,102,241,.06); }
    .dropzone input[type=file] {
      position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
    }
    .dz-icon { font-size:2.2rem; margin-bottom:.4rem; }
    .dz-text { color:#94a3b8; font-size:.9rem; }
    .dz-text span { color:#6366f1; font-weight:600; }

    /* Preview */
    #preview-wrap { margin-top:1.25rem; display:none; text-align:center; }
    #preview-wrap img {
      max-height:280px; max-width:100%;
      border-radius:10px; border:2px solid #334155;
    }

    /* Submit */
    #submit-btn {
      margin-top:1.5rem; width:100%; padding:.85rem;
      border-radius:10px; border:none;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff; font-size:1rem; font-weight:700;
      cursor:pointer; transition:opacity .2s;
    }
    #submit-btn:disabled { opacity:.45; cursor:not-allowed; }
    #submit-btn:not(:disabled):hover { opacity:.88; }

    /* Result */
    #result { margin-top:1.5rem; display:none; }
    .result-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:#64748b; margin-bottom:.45rem; }
    .caption-box {
      background:#0f172a; border:1px solid #334155;
      border-radius:10px; padding:1rem 1.25rem;
      font-size:1rem; line-height:1.65; color:#e2e8f0;
    }
    .error-box {
      background:rgba(239,68,68,.1); border:1px solid #ef4444;
      border-radius:10px; padding:.85rem 1.25rem;
      color:#fca5a5; font-size:.9rem;
    }
    .spinner {
      display:inline-block; width:16px; height:16px;
      border:3px solid rgba(255,255,255,.3); border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:6px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <h1>🖼️ Image Caption Generator</h1>
  <p class="sub">Upload any image — get an AI-generated description</p>

  <div class="api-row">
    <label>API</label>
    <input type="text" id="api-url" value="http://localhost:8000" />
  </div>

  <div class="dropzone" id="dropzone">
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" />
    <div class="dz-icon">📷</div>
    <p class="dz-text">Drag & drop or <span>browse</span></p>
    <p class="dz-text" style="font-size:.78rem;margin-top:.25rem;">JPEG · PNG · WebP</p>
  </div>

  <div id="preview-wrap"><img id="preview" src="" alt="Preview"/></div>

  <button id="submit-btn" disabled>Generate Caption</button>

  <div id="result"></div>
</div>

<script>
  const fileInput   = document.getElementById("file-input");
  const dropzone    = document.getElementById("dropzone");
  const previewWrap = document.getElementById("preview-wrap");
  const preview     = document.getElementById("preview");
  const submitBtn   = document.getElementById("submit-btn");
  const resultDiv   = document.getElementById("result");
  const apiInput    = document.getElementById("api-url");

  let selectedFile = null;

  // Drag & drop
  dropzone.addEventListener("dragover",  e => { e.preventDefault(); dropzone.classList.add("over"); });
  dropzone.addEventListener("dragleave", ()  => dropzone.classList.remove("over"));
  dropzone.addEventListener("drop", e => {
    e.preventDefault(); dropzone.classList.remove("over");
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  function handleFile(file) {
    selectedFile = file;
    preview.src = URL.createObjectURL(file);
    previewWrap.style.display = "block";
    submitBtn.disabled = false;
    resultDiv.style.display = "none";
  }

  submitBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Generating…';
    resultDiv.style.display = "none";

    const fd = new FormData();
    fd.append("file", selectedFile);
    const url = (apiInput.value || "http://localhost:8000").replace(/\/$/, "") + "/caption";

    try {
      const resp = await fetch(url, { method: "POST", body: fd });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || "Request failed");
      }
      const data = await resp.json();
      resultDiv.innerHTML = `
        <p class="result-label">Generated Caption</p>
        <div class="caption-box">${data.caption}</div>`;
    } catch (e) {
      resultDiv.innerHTML = `<div class="error-box">⚠️ ${e.message}</div>`;
    } finally {
      resultDiv.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.innerHTML = "Generate Caption";
    }
  });
</script>
</body>
</html>
